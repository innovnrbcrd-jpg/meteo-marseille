<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Météo Marseille - MF13055029</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .card {
      max-width: 320px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      border: 1px solid #e5e7eb;
    }
    h2 {
      margin: 0 0 4px 0;
      font-size: 20px;
    }
    .sub {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .box {
      background: #f9fafb;
      border: 1px solid #eef2f7;
      border-radius: 12px;
      padding: 10px;
    }
    .label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
    }
    .unit {
      font-size: 12px;
      font-weight: 400;
      color: #6b7280;
    }
    .rose-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0 14px 0;
    }
    canvas {
      background: #fff;
      border-radius: 50%;
    }
    .forecast-title {
      font-size: 14px;
      font-weight: 700;
      margin: 8px 0 8px 0;
    }
    .forecast {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 210px;
      overflow: auto;
      padding-right: 4px;
    }
    .forecast-item {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      background: #f9fafb;
      border: 1px solid #eef2f7;
      border-radius: 10px;
      padding: 8px;
    }
    .time {
      font-weight: 700;
      color: #111827;
    }
    .line2 {
      color: #374151;
    }
    .dir {
      color: #6b7280;
      font-size: 11px;
      margin-top: 2px;
    }
    .error {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Marseille</h2>
  <div class="sub">Station MF13055029</div>

  <div class="grid">
    <div class="box">
      <div class="label">Température</div>
      <div class="value"><span id="temp">--</span><span class="unit"> °C</span></div>
    </div>
    <div class="box">
      <div class="label">Humidité</div>
      <div class="value"><span id="hum">--</span><span class="unit"> %</span></div>
    </div>
    <div class="box">
      <div class="label">Vent moyen</div>
      <div class="value"><span id="wind">--</span><span class="unit"> km/h</span></div>
    </div>
    <div class="box">
      <div class="label">Rafales</div>
      <div class="value"><span id="gust">--</span><span class="unit"> km/h</span></div>
    </div>
  </div>

  <div class="box" style="margin-bottom:12px;">
    <div class="label">Direction du vent</div>
    <div class="value"><span id="dir">--</span><span class="unit"> °</span></div>
    <div class="dir" id="cardinal">--</div>
  </div>

  <div class="rose-wrap">
    <canvas id="rose" width="170" height="170"></canvas>
  </div>

  <div class="forecast-title">Prévisions AROME</div>
  <div class="forecast" id="forecast"></div>

  <div class="error" id="error">Impossible de charger les données météo.</div>
</div>

<script>
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];

  function degToCardinal(deg) {
    if (deg === null || deg === undefined || isNaN(deg)) return "--";
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function drawRose(dir) {
    const canvas = document.getElementById("rose");
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const r = 60;

    ctx.clearRect(0, 0, w, h);

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = "#d1d5db";
    ctx.lineWidth = 2;
    ctx.stroke();

    const marks = [
      {t:"N", x:cx, y:cy-r-10},
      {t:"E", x:cx+r+10, y:cy+4},
      {t:"S", x:cx, y:cy+r+18},
      {t:"O", x:cx-r-10, y:cy+4}
    ];

    ctx.fillStyle = "#6b7280";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    marks.forEach(m => ctx.fillText(m.t, m.x, m.y));

    if (dir !== null && dir !== undefined && !isNaN(dir)) {
      const rad = (dir - 90) * Math.PI / 180;
      const x = cx + r * Math.cos(rad);
      const y = cy + r * Math.sin(rad);

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x, y);
      ctx.strokeStyle = "#dc2626";
      ctx.lineWidth = 4;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, 4, 0, 2 * Math.PI);
      ctx.fillStyle = "#dc2626";
      ctx.fill();
    }
  }

  async function load() {
    try {
      const res = await fetch(
        "https://api.open-meteo.com/v1/forecast?" +
        "latitude=43.2965&longitude=5.3698&" +
        "current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m&" +
        "hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m&" +
        "models=meteofrance_arome&" +
        "wind_speed_unit=kmh&timezone=auto"
      );

      const data = await res.json();
      const c = data.current;

      document.getElementById("temp").innerText = c.temperature_2m ?? "--";
      document.getElementById("hum").innerText = c.relative_humidity_2m ?? "--";
      document.getElementById("wind").innerText = c.wind_speed_10m ?? "--";
      document.getElementById("gust").innerText = c.wind_gusts_10m ?? "--";
      document.getElementById("dir").innerText = c.wind_direction_10m ?? "--";
      document.getElementById("cardinal").innerText = degToCardinal(c.wind_direction_10m);

      drawRose(c.wind_direction_10m);

      let html = "";
      const n = Math.min(6, data.hourly.time.length);
      for (let i = 0; i < n; i++) {
        const time = data.hourly.time[i].slice(11, 16);
        const temp = data.hourly.temperature_2m[i];
        const hum = data.hourly.relative_humidity_2m[i];
        const wind = data.hourly.wind_speed_10m[i];
        const gust = data.hourly.wind_gusts_10m[i];
        const dir = data.hourly.wind_direction_10m[i];
        const card = degToCardinal(dir);

        html += `
          <div class="forecast-item">
            <div class="time">${time}</div>
            <div>
              <div class="line2">${temp}°C | ${hum}% | ${wind} km/h | raf. ${gust} km/h</div>
              <div class="dir">${dir}° · ${card}</div>
            </div>
          </div>
        `;
      }
      document.getElementById("forecast").innerHTML = html;
      document.getElementById("error").style.display = "none";
    } catch (e) {
      document.getElementById("error").style.display = "block";
    }
  }

  load();
  setInterval(load, 300000);
</script>

</body>
</html>
